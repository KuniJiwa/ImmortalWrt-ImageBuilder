      skip_imagebuilder:
        description: "直接使用底包快速构建固件, 忽略自定义插件 ----（跳过 ImageBuilder）"
        required: false
        default: false
        type: boolean
      replace_banner:
        description: '替换为ImmortalWrt的banner信息'
        required: false
        default: false
        type: boolean
      rootfs_partsize:
        description: '软件包大小1G固定'
        required: true
        default: "1024"
        type: choice
        options:
          - '1024'
      builder_name:
        description: "设置打包作者的名称"
        required: true
        default: 'wukongdaily'

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  PACKAGED_OUTPUTPATH: /opt/openwrt_packit/output

jobs:
  build:
    runs-on: ubuntu-22.04
    concurrency:
      group: n1-build
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: 版本内核校验并清理环境
        run: |
          LUCI="${{ inputs.luci_version }}"
          KERNEL="${{ inputs.openwrt_kernel }}"
          if [[ "$LUCI" == "23.05.3" && "$KERNEL" != "5.15.189" ]]; then
            exit 1
          fi
          if [[ "$LUCI" == "24.10."* && "$KERNEL" == "5.15.189" ]]; then
            exit 1
          fi
          echo "清理虚拟机冗余..."
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/lib/node_modules /home/linuxbrew 2>/dev/null || true
          sudo apt-get clean -y 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          sudo rm -rf /tmp/* 2>/dev/null || true
          df -h
          echo "清理完成"

      - name: Clean old artifacts
        run: |
          rm -rf bin/targets/armsr/armv8/
          mkdir -p bin/targets/armsr/armv8/
          rm -rf /tmp/store-run-repo /tmp/opkg_fix 2>/dev/null || true
          echo "输出目录已重建，临时目录已清理"

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/n1/build.sh

      - name: Debug workspace contents
        run: ls -R
      
      - name: Enable integrations
        run: |
          if [ "${{ inputs.enable_store }}" == "true" ]; then
            echo "ENABLE_STORE=true" >> $GITHUB_ENV
            echo "✅ 已启用 luci-app-store"
          else
            echo "ENABLE_STORE=false" >> $GITHUB_ENV
            echo "❎ 未启用 luci-app-store"
          fi
          if [ "${{ inputs.enable_oc }}" == "true" ]; then
            echo "ENABLE_OC=true" >> $GITHUB_ENV
            echo "✅ 已启用 OpenClash"
          else
            echo "ENABLE_OC=false" >> $GITHUB_ENV
            echo "❎ 未启用 OpenClash"
          fi

      - name: 处理是否替换 banner 信息
        if: ${{ github.event.inputs.skip_imagebuilder == 'false' && github.event.inputs.replace_banner == 'true' }}
        run: |
          cp n1/99-banner.sh files/etc/uci-defaults/
      
      - name: Building N1 ImmortalWrt rootfs 24.10.x
        if: ${{ github.event.inputs.skip_imagebuilder != 'true' }}
        run: |
          echo "✅ 使用 ImageBuilder 构建 rootfs"
          profiles="generic"
          include_docker="${{ github.event.inputs.include_docker }}"
          rootfs_partsize="${{ github.event.inputs.rootfs_partsize }}"
          luci_version="${{ github.event.inputs.luci_version }}"
          
          IFS=',' read -r -a profile_array <<< "$profiles"
          
          for profile in "${profile_array[@]}"; do
            echo "Building for profile: $profile"
            
            docker run --rm -i \
              --user root \
              -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
              -v "${{ github.workspace }}/files/etc/uci-defaults:/home/build/immortalwrt/files/etc/uci-defaults" \
              -v "${{ github.workspace }}/arch/arch.conf:/home/build/immortalwrt/files/etc/opkg/arch.conf" \
              -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
              -v "${{ github.workspace }}/n1/banner:/home/build/immortalwrt/files/mnt/banner" \
              -v "${{ github.workspace }}/n1/imm.config:/home/build/immortalwrt/.config" \
              -v "${{ github.workspace }}/n1/build.sh:/home/build/immortalwrt/build.sh" \
              -e PROFILE=$profile \
              -e INCLUDE_DOCKER=$include_docker \
              -e ROOTFS_PARTSIZE=$rootfs_partsize \
              -e ENABLE_STORE=${{ env.ENABLE_STORE }} \
              -e ENABLE_OC=${{ env.ENABLE_OC }} \
              immortalwrt/imagebuilder:armsr-armv8-openwrt-${luci_version} /bin/bash /home/build/immortalwrt/build.sh
          done
          
      - name: Download prebuilt rootfs.tar.gz
        if: ${{ github.event.inputs.skip_imagebuilder == 'true' }}
        run: |
          echo "📦 正在下载预构建 rootfs"
          echo "PREBUILT_LUCI_VERSION=24.10.2" >> $GITHUB_ENV
          mkdir -p bin/targets/armsr/armv8
          curl -L -o bin/targets/armsr/armv8/openwrt-armvirt-64-default-rootfs.tar.gz \
            https://github.com/wukongdaily/AutoBuildImmortalWrt/releases/download/rootfs/immortalwrt-24.10.2-armsr-armv8-generic-rootfs.tar.gz

      - name: 查找rootfs.tar.gz所在路径
        id: find_rootfs
        run: |
          ROOTFS_FILE=$(find bin/targets/armsr/armv8/ -type f -name "*rootfs.tar.gz" | head -n1)
          echo "✅ 已找到固件包：$ROOTFS_FILE"
          ls -lh "$ROOTFS_FILE"
          if [ ! -f "$ROOTFS_FILE" ]; then
            echo "❌ 找不到 rootfs.tar.gz 文件"
            exit 1
          fi
          echo "file=$ROOTFS_FILE" >> $GITHUB_OUTPUT

      - name: Package armsr-armv8 as ImmortalWrt for N1
        uses: wukongdaily/flippy-openwrt-actions@master
        env:
          OPENWRT_ARMVIRT: ${{ steps.find_rootfs.outputs.file }}
          PACKAGE_SOC: s905d
          KERNEL_VERSION_NAME: ${{ inputs.openwrt_kernel }}
          KERNEL_AUTO_LATEST: false
          WHOAMI: ${{ inputs.builder_name }}

      - name: Set up environment
        run: mkdir -p "$PACKAGED_OUTPUTPATH"

      - name: Backup rootfs
        run: |
          ROOTFS_SRC=$(find "${GITHUB_WORKSPACE}/bin/targets/armsr/armv8/" -name "*rootfs.tar.gz" -type f 2>/dev/null | head -n1)
          [ -f "$ROOTFS_SRC" ] || exit 0
          KERNEL_VERSION=$(ls "${PACKAGED_OUTPUTPATH}"/*.img.gz 2>/dev/null | head -n1 | grep -oP 'k\d+\.\d+\.\d+' || echo "unknown")
          LUCI_VER="${PREBUILT_LUCI_VERSION:-${{ inputs.luci_version }}}"
          BUILD_DATETIME=$(date +%Y%m%d%H%M)
          ROOTFS_NAME="immortalwrt-${LUCI_VER}-phicomm-n1-btrfs-${KERNEL_VERSION}-${BUILD_DATETIME}-rootfs.tar.gz"
          cp "$ROOTFS_SRC" "${PACKAGED_OUTPUTPATH}/${ROOTFS_NAME}"
          echo "✅ rootfs 已保存：$ROOTFS_NAME"

      - name: Rename firmware files
        run: |
          cd "${PACKAGED_OUTPUTPATH}"
          shopt -s nullglob
          for f in *.img.gz; do
            KERNEL_VERSION=$(echo "$f" | grep -oP 'k\d+\.\d+\.\d+' || echo "unknown")
            LUCI_VER="${PREBUILT_LUCI_VERSION:-${{ inputs.luci_version }}}"
            BUILD_DATETIME=$(date +%Y%m%d%H%M)
            NEW_NAME="immortalwrt-${LUCI_VER}-phicomm-n1-btrfs-${KERNEL_VERSION}-${BUILD_DATETIME}.img.gz"
            echo "Processing: $f"
            gunzip "$f"
            mv "${f%.gz}" "${NEW_NAME%.gz}"
            gzip "${NEW_NAME%.gz}"
            echo "Renamed to: $NEW_NAME"
          done
          shopt -u nullglob

      - name: Create or update GitHub release
        run: |
          RELEASE_TAG="phicomm-n1"
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Creating new release: $RELEASE_TAG"
            gh release create "$RELEASE_TAG" \
              ${PACKAGED_OUTPUTPATH}/*.img.gz \
              ${PACKAGED_OUTPUTPATH}/immortalwrt-*-rootfs.tar.gz \
              --title "ImmortalWrt N1 固件合集" \
              --notes-file "${GITHUB_WORKSPACE}/n1/info.md" \
              --repo "$GITHUB_REPOSITORY"
          else
            echo "Updating existing release: $RELEASE_TAG"
            gh release upload "$RELEASE_TAG" \
              ${PACKAGED_OUTPUTPATH}/*.img.gz \
              ${PACKAGED_OUTPUTPATH}/immortalwrt-*-rootfs.tar.gz \
              --repo "$GITHUB_REPOSITORY"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Firmware diagnostics
        run: |
          export LUCI_VERSION="${{ inputs.luci_version }}"
          export PACKAGED_OUTPUTPATH="${{ env.PACKAGED_OUTPUTPATH }}"
          chmod +x shell/check-firmware.sh
          bash shell/check-firmware.sh || echo "诊断失败，不影响编译"
